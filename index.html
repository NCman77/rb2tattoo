<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IG 美髮行事曆產生器</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 html2canvas 用於匯出圖片 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600;700&family=Outfit:wght@400;600&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <!-- 上方區塊：圖片預覽區 (16:9 ratio) -->
        <div class="preview-section">
            <div id="canvas-container" class="canvas-container">
                <div id="canvasMediaLayer" class="canvas-media-layer">
                    <img id="canvasBgImage" class="canvas-bg-media" alt="">
                    <video id="canvasBgVideo" class="canvas-bg-media" muted loop playsinline preload="metadata"></video>
                </div>
                <!-- 預設背景提示 -->
                <div class="empty-state-hint" id="emptyStateHint">
                    <!-- 移除文字，保持畫布乾淨 -->
                </div>
                <!-- 各種可拖曳的元素將會被動態加入這裡 -->
            </div>

            <!-- 匯出與清除按鈕懸浮區 -->
            <div class="floating-actions">
                <input type="file" id="bgInput" accept="image/*,video/*" class="hidden-input">
                <button id="btnUpload" class="action-btn primary-btn" title="選擇媒體" aria-label="選擇媒體"
                    onclick="document.getElementById('bgInput').click()">
                    <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span class="action-label">選擇媒體</span>
                </button>
                <button id="btnExport" class="action-btn primary-btn" title="複製圖片" aria-label="複製圖片">
                    <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="action-label">複製PNG</span>
                </button>
                <button id="btnDownload" class="action-btn primary-btn" title="下載PNG" aria-label="下載PNG">
                    <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 3v12"></path>
                        <path d="m7 10 5 5 5-5"></path>
                        <path d="M5 21h14"></path>
                    </svg>
                    <span class="action-label">下載PNG</span>
                </button>
                <button id="btnDownloadVideo" class="action-btn primary-btn" title="下載動態" aria-label="下載動態">
                    <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M23 7l-7 5 7 5V7z"></path>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    <span class="action-label">下載動態</span>
                </button>
                <button id="btnClear" class="action-btn danger-btn" title="清空畫布" aria-label="清空畫布">
                    <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 中間區塊：功能標籤導覽 (Tabs) -->
        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-calendar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7" />
                    <path d="M16 2v4" />
                    <path d="M8 2v4" />
                    <path d="M3 10h18" />
                    <path
                        d="M21.29 13.15a2.43 2.43 0 0 0-3.44 0L16.5 14.5l-1.35-1.35a2.43 2.43 0 0 0-3.44 3.44l3.12 3.12 1.67 1.67 5.14-5.15a2.43 2.43 0 0 0 0-3.44Z" />
                </svg>
                月曆
            </button>
            <button class="tab-btn" data-target="tab-time">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="margin-right:4px;">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                時段
            </button>
            <button class="tab-btn" data-target="tab-icons">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="margin-right:4px;">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
                印章
            </button>
            <button class="tab-btn" data-target="tab-text">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="margin-right:4px;">
                    <path d="M4 7V4h16v3" />
                    <path d="M9 20h6" />
                    <path d="M12 4v16" />
                </svg>
                文字
            </button>
            <button class="tab-btn" data-target="tab-giphy">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="margin-right:4px;">
                    <rect x="2" y="3" width="20" height="18" rx="3" ry="3" />
                    <polyline points="7 10 10 13 17 7" />
                </svg>
                貼圖
            </button>
        </div>

        <!-- 下方區塊：功能操作面板 (Panels) -->
        <div class="panels-container">

            <!-- 1. 月曆操作面板 -->
            <div id="tab-calendar" class="panel active">
                <div class="form-group">
                    <div class="date-selectors">
                        <div class="flex-column" style="flex: 1;">
                            <label style="margin-bottom: 4px;">年份</label>
                            <select id="selYear" class="full-width">
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                                <option value="2028">2028</option>
                                <option value="2029">2029</option>
                                <option value="2030">2030</option>
                            </select>
                        </div>
                        <div class="flex-column" style="flex: 1;">
                            <label style="margin-bottom: 4px;">月份</label>
                            <select id="selMonth" class="full-width">
                                <!-- JS 動態生成 1-12 -->
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="calendar-style-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                            <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                            <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                            <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                            <path
                                d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.7-.7 1.7-1.6 0-.4-.1-.8-.4-1.1-.3-.3-.4-.7-.4-1.1 0-.9.7-1.7 1.7-1.7H17c3.9 0 7-3.1 7-7 0-4.4-4.5-8-10-8z" />
                        </svg>
                        月曆風格選擇 (10款)
                    </div>
                    <div id="calendarStyleGrid" class="style-grid">
                        <button type="button" class="style-option-btn active" data-style="style-transparent">完全透明
                            (推薦)</button>
                        <button type="button" class="style-option-btn" data-style="style-glass">霧面玻璃</button>
                        <button type="button" class="style-option-btn" data-style="style-cream">奶油白卡</button>
                        <button type="button" class="style-option-btn" data-style="style-dark">深夜黑卡</button>
                        <button type="button" class="style-option-btn" data-style="style-border">極簡線框</button>
                        <button type="button" class="style-option-btn" data-style="style-milktea">奶茶拿鐵</button>
                        <button type="button" class="style-option-btn" data-style="style-polaroid">拍立得風</button>
                        <button type="button" class="style-option-btn" data-style="style-modern">現代無襯線</button>
                        <button type="button" class="style-option-btn" data-style="style-line">質感分隔線</button>
                        <button type="button" class="style-option-btn" data-style="style-elegant">法式古典</button>
                    </div>
                </div>
            </div>

            <!-- 3. 時間/時段操作面板 -->
            <div id="tab-time" class="panel">
                <div class="time-input-group"
                    style="display: flex; gap: 8px; align-items: flex-end; margin-bottom: 12px; justify-content: space-between;">
                    <div class="time-select" style="flex: 1; justify-content: flex-start; gap: 4px; flex-wrap: wrap;">
                        <div class="flex-column" style="flex: 1; min-width: 120px;">
                            <label style="margin-bottom: 4px;">選擇日期</label>
                            <select id="selDate" style="width: 100%; padding-left: 8px; padding-right: 28px;"></select>
                        </div>
                    </div>
                    <button id="btnAddDate" class="action-btn secondary-btn"
                        style="padding: 8px 12px; border: 1px solid #ccc; justify-content: center; white-space: nowrap;">加入日期</button>
                </div>

                <div class="time-input-group"
                    style="display: flex; gap: 8px; align-items: flex-end; margin-bottom: 12px; justify-content: space-between;">
                    <div class="time-select" style="flex: 1; display: flex; gap: 8px;">
                        <div class="flex-column" style="flex: 1; min-width: 90px;">
                            <label style="margin-bottom: 4px;">選擇小時</label>
                            <select id="selHour" style="width: 100%; text-align: center;"></select>
                        </div>
                        <div class="flex-column" style="flex: 1; min-width: 90px;">
                            <label style="margin-bottom: 4px;">選擇分鐘</label>
                            <select id="selMinute" style="width: 100%; text-align: center;"></select>
                        </div>
                    </div>
                    <button id="btnAddTimeOnly" class="action-btn secondary-btn"
                        style="padding: 8px 12px; border: 1px solid #ccc; justify-content: center; white-space: nowrap;">加入時段</button>
                </div>

                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <button id="btnAddFull" class="action-btn status-action-btn status-action-full"
                        style="flex: 1; padding: 10px 0; justify-content: center;">滿</button>
                    <button id="btnAddReleased" class="action-btn status-action-btn status-action-released"
                        style="flex: 1; padding: 10px 0; justify-content: center;">釋出</button>
                    <button id="btnAddEmpty" class="action-btn secondary-btn"
                        style="flex: 1; padding: 10px 0; border: 1px solid #ccc; justify-content: center;">空檔</button>
                </div>

                <!-- 符號按鈕區塊 -->
                <div class="symbol-buttons"
                    style="display: flex; gap: 3px; flex-wrap: nowrap; margin-bottom: 16px; justify-content: space-between; overflow: hidden;">
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">：</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">、</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">，</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">。</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">※</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">／</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">＆</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">∣</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">＃</button>
                    <button class="action-btn secondary-btn symbol-btn"
                        style="flex: 1; min-width: 0; padding: 8px 0; border: 1px solid #ccc;">！</button>
                </div>

                <div class="form-group">
                    <label style="margin-bottom: 4px;">輸入預覽區</label>
                    <textarea id="txtTimeDesc" class="full-width" rows="3"></textarea>
                </div>

                <div class="form-group mt-10">
                    <label>時段標籤樣式</label>
                    <div class="style-options"
                        style="display: flex; gap: 4px; flex-wrap: nowrap; overflow: hidden; width: 100%;">
                        <label class="radio-label" style="flex: 1; min-width: 0;">
                            <input type="radio" name="timeStyle" value="transparent" checked>
                            <span class="radio-custom"
                                style="display: block; width: 100%; text-align: center; white-space: nowrap; padding: 8px 0; overflow: hidden; text-overflow: ellipsis; font-size: 0.85rem;">透明底色</span>
                        </label>
                        <label class="radio-label" style="flex: 1; min-width: 0;">
                            <input type="radio" name="timeStyle" value="translucent">
                            <span class="radio-custom"
                                style="display: block; width: 100%; text-align: center; white-space: nowrap; padding: 8px 0; overflow: hidden; text-overflow: ellipsis; font-size: 0.85rem;">半透黑底</span>
                        </label>
                        <label class="radio-label" style="flex: 1; min-width: 0;">
                            <input type="radio" name="timeStyle" value="translucent-white">
                            <span class="radio-custom"
                                style="display: block; width: 100%; text-align: center; white-space: nowrap; padding: 8px 0; overflow: hidden; text-overflow: ellipsis; font-size: 0.85rem;">半透白底</span>
                        </label>
                        <label class="radio-label" style="flex: 1; min-width: 0;">
                            <input type="radio" name="timeStyle" value="solid">
                            <span class="radio-custom"
                                style="display: block; width: 100%; text-align: center; white-space: nowrap; padding: 8px 0; overflow: hidden; text-overflow: ellipsis; font-size: 0.85rem;">白底實色</span>
                        </label>
                    </div>
                </div>

                <button id="btnAddTimeSlot" class="full-btn">新增</button>
            </div>

            <!-- 4. 印章工具面板 -->
            <div id="tab-icons" class="panel">
                <h4 class="sub-title">預約狀態</h4>
                <div class="stamp-grid stamp-grid-status">
                    <button type="button" class="stamp-btn stamp-btn-full active" data-stamp="full">滿</button>
                    <button type="button" class="stamp-btn stamp-btn-empty" data-stamp="empty">空</button>
                    <button type="button" class="stamp-btn stamp-btn-rest" data-stamp="rest">休</button>
                    <button type="button" class="stamp-btn stamp-btn-mark-check" data-stamp="mark-check">✓</button>
                    <button type="button" class="stamp-btn stamp-btn-full stamp-btn-round"
                        data-stamp="full-round">滿</button>
                    <button type="button" class="stamp-btn stamp-btn-empty stamp-btn-round"
                        data-stamp="empty-round">空</button>
                    <button type="button" class="stamp-btn stamp-btn-rest stamp-btn-round"
                        data-stamp="rest-round">休</button>
                    <button type="button" class="stamp-btn stamp-btn-mark-cross" data-stamp="mark-cross">✕</button>
                </div>

                <h4 class="sub-title">圖示裝飾</h4>
                <div class="stamp-filter-row" id="stampIconCategoryRow">
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn active"
                        data-icon-category="lunar-new-year">新年</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="valentine">情人節</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="dragon-boat">端午節</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="mid-autumn">中秋節</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="halloween">萬聖節</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="christmas">聖誕節</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="travel">旅遊</button>
                    <button type="button" class="stamp-filter-btn stamp-icon-category-btn"
                        data-icon-category="flags">國旗</button>
                </div>
                <div class="stamp-filter-row stamp-flag-region-wrap is-hidden" id="stampFlagRegionWrap">
                    <button type="button" class="stamp-filter-btn stamp-flag-region-btn active"
                        data-flag-region="asia">亞洲</button>
                    <button type="button" class="stamp-filter-btn stamp-flag-region-btn"
                        data-flag-region="europe">歐洲</button>
                    <button type="button" class="stamp-filter-btn stamp-flag-region-btn"
                        data-flag-region="americas">美洲</button>
                    <button type="button" class="stamp-filter-btn stamp-flag-region-btn"
                        data-flag-region="africa">非洲</button>
                    <button type="button" class="stamp-filter-btn stamp-flag-region-btn"
                        data-flag-region="oceania">大洋洲</button>
                </div>
                <div class="stamp-grid stamp-grid-icons" id="stampIconGrid"></div>
            </div>

            <!-- 5. 文字/貼圖面板 -->
            <div id="tab-text" class="panel">
                <h4 class="sub-title">輸入預覽區</h4>

                <div class="form-group">
                    <textarea id="txtStickerContent" class="full-width text-input-area" rows="3"
                        placeholder="輸入文字"></textarea>
                </div>

                <div class="form-group">
                    <label for="txtStickerColor">文字顏色</label>
                    <input type="hidden" id="txtStickerColor" value="#111111">
                    <div class="color-palette" data-target-input="txtStickerColor">
                        <button type="button" class="color-swatch active" data-color="#111111" style="--swatch:#111111"
                            aria-label="黑色"></button>
                        <button type="button" class="color-swatch" data-color="#ffffff" style="--swatch:#ffffff"
                            aria-label="白色"></button>
                        <button type="button" class="color-swatch" data-color="#b56b5d" style="--swatch:#b56b5d"
                            aria-label="紅棕"></button>
                        <button type="button" class="color-swatch" data-color="#5c8a58" style="--swatch:#5c8a58"
                            aria-label="綠色"></button>
                        <button type="button" class="color-swatch" data-color="#5c544d" style="--swatch:#5c544d"
                            aria-label="深棕"></button>
                        <button type="button" class="color-swatch" data-color="#4b7bbd" style="--swatch:#4b7bbd"
                            aria-label="藍色"></button>
                        <button type="button" class="color-swatch" data-color="#d7923b" style="--swatch:#d7923b"
                            aria-label="琥珀"></button>
                        <button type="button" class="color-swatch" data-color="#c56a42" style="--swatch:#c56a42"
                            aria-label="橘棕"></button>
                        <button type="button" class="color-swatch" data-color="#d16a8c" style="--swatch:#d16a8c"
                            aria-label="玫紅"></button>
                        <button type="button" class="color-swatch" data-color="#7b60a8" style="--swatch:#7b60a8"
                            aria-label="紫色"></button>
                        <button type="button" class="color-swatch" data-color="#3f8e8a" style="--swatch:#3f8e8a"
                            aria-label="青綠"></button>
                        <button type="button" class="color-swatch" data-color="#f2c94c" style="--swatch:#f2c94c"
                            aria-label="金黃"></button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="toggle-row">
                        <input type="checkbox" id="chkStickerStroke">
                        <span>文字描邊</span>
                    </label>
                    <div class="text-inline-controls">
                        <input type="hidden" id="txtStickerStrokeColor" value="#111111">
                        <div class="color-palette" data-target-input="txtStickerStrokeColor">
                            <button type="button" class="color-swatch active" data-color="#111111"
                                style="--swatch:#111111" aria-label="黑色"></button>
                            <button type="button" class="color-swatch" data-color="#ffffff" style="--swatch:#ffffff"
                                aria-label="白色"></button>
                            <button type="button" class="color-swatch" data-color="#b56b5d" style="--swatch:#b56b5d"
                                aria-label="紅棕"></button>
                            <button type="button" class="color-swatch" data-color="#5c8a58" style="--swatch:#5c8a58"
                                aria-label="綠色"></button>
                            <button type="button" class="color-swatch" data-color="#5c544d" style="--swatch:#5c544d"
                                aria-label="深棕"></button>
                            <button type="button" class="color-swatch" data-color="#4b7bbd" style="--swatch:#4b7bbd"
                                aria-label="藍色"></button>
                            <button type="button" class="color-swatch" data-color="#d7923b" style="--swatch:#d7923b"
                                aria-label="琥珀"></button>
                            <button type="button" class="color-swatch" data-color="#c56a42" style="--swatch:#c56a42"
                                aria-label="橘棕"></button>
                            <button type="button" class="color-swatch" data-color="#d16a8c" style="--swatch:#d16a8c"
                                aria-label="玫紅"></button>
                            <button type="button" class="color-swatch" data-color="#7b60a8" style="--swatch:#7b60a8"
                                aria-label="紫色"></button>
                            <button type="button" class="color-swatch" data-color="#3f8e8a" style="--swatch:#3f8e8a"
                                aria-label="青綠"></button>
                            <button type="button" class="color-swatch" data-color="#f2c94c" style="--swatch:#f2c94c"
                                aria-label="金黃"></button>
                        </div>
                        <div class="range-inline">
                            <input type="range" id="rngStickerStrokeWidth" min="0" max="8" step="1" value="2">
                            <span id="lblStickerStrokeWidth">2</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="text-inline-controls">
                        <label class="toggle-row">
                            <input type="checkbox" id="chkStickerBold">
                            <span>粗體</span>
                        </label>
                        <label class="toggle-row">
                            <input type="checkbox" id="chkStickerItalic">
                            <span>斜體</span>
                        </label>
                        <label class="toggle-row">
                            <input type="checkbox" id="chkStickerUnderline">
                            <span>底線</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="rngStickerOpacity">文字透明度</label>
                    <div class="range-inline">
                        <input type="range" id="rngStickerOpacity" min="0" max="100" step="1" value="100">
                        <span id="lblStickerOpacity">100%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="toggle-row">
                        <input type="checkbox" id="chkStickerBox">
                        <span>加外框</span>
                    </label>
                    <div class="text-inline-controls">
                        <div class="color-field" style="flex-direction: column; align-items: flex-start; width: 100%;">
                            <label for="txtStickerBoxBorder" style="margin-bottom: 4px;">外框色</label>
                            <input type="hidden" id="txtStickerBoxBorder" value="#ffffff">
                            <div class="color-palette" data-target-input="txtStickerBoxBorder">
                                <button type="button" class="color-swatch" data-color="#111111" style="--swatch:#111111"
                                    aria-label="黑色"></button>
                                <button type="button" class="color-swatch active" data-color="#ffffff"
                                    style="--swatch:#ffffff" aria-label="白色"></button>
                                <button type="button" class="color-swatch" data-color="#b56b5d" style="--swatch:#b56b5d"
                                    aria-label="紅棕"></button>
                                <button type="button" class="color-swatch" data-color="#5c8a58" style="--swatch:#5c8a58"
                                    aria-label="綠色"></button>
                                <button type="button" class="color-swatch" data-color="#5c544d" style="--swatch:#5c544d"
                                    aria-label="深棕"></button>
                                <button type="button" class="color-swatch" data-color="#4b7bbd" style="--swatch:#4b7bbd"
                                    aria-label="藍色"></button>
                                <button type="button" class="color-swatch" data-color="#d7923b" style="--swatch:#d7923b"
                                    aria-label="琥珀"></button>
                                <button type="button" class="color-swatch" data-color="#c56a42" style="--swatch:#c56a42"
                                    aria-label="橘棕"></button>
                                <button type="button" class="color-swatch" data-color="#d16a8c" style="--swatch:#d16a8c"
                                    aria-label="玫紅"></button>
                                <button type="button" class="color-swatch" data-color="#7b60a8" style="--swatch:#7b60a8"
                                    aria-label="紫色"></button>
                                <button type="button" class="color-swatch" data-color="#3f8e8a" style="--swatch:#3f8e8a"
                                    aria-label="青綠"></button>
                                <button type="button" class="color-swatch" data-color="#f2c94c" style="--swatch:#f2c94c"
                                    aria-label="金黃"></button>
                            </div>
                        </div>
                        <div class="color-field"
                            style="flex-direction: column; align-items: flex-start; width: 100%; margin-top: 8px;">
                            <label for="txtStickerBoxFill" style="margin-bottom: 4px;">底色</label>
                            <input type="hidden" id="txtStickerBoxFill" value="transparent">
                            <div class="color-palette" data-target-input="txtStickerBoxFill">
                                <button type="button" class="color-swatch color-swatch--transparent active"
                                    data-color="transparent" aria-label="透明"></button>
                                <button type="button" class="color-swatch" data-color="#111111" style="--swatch:#111111"
                                    aria-label="黑色"></button>
                                <button type="button" class="color-swatch" data-color="#ffffff" style="--swatch:#ffffff"
                                    aria-label="白色"></button>
                                <button type="button" class="color-swatch" data-color="#b56b5d" style="--swatch:#b56b5d"
                                    aria-label="紅棕"></button>
                                <button type="button" class="color-swatch" data-color="#5c8a58" style="--swatch:#5c8a58"
                                    aria-label="綠色"></button>
                                <button type="button" class="color-swatch" data-color="#5c544d" style="--swatch:#5c544d"
                                    aria-label="深棕"></button>
                                <button type="button" class="color-swatch" data-color="#4b7bbd" style="--swatch:#4b7bbd"
                                    aria-label="藍色"></button>
                                <button type="button" class="color-swatch" data-color="#d7923b" style="--swatch:#d7923b"
                                    aria-label="琥珀"></button>
                                <button type="button" class="color-swatch" data-color="#c56a42" style="--swatch:#c56a42"
                                    aria-label="橘棕"></button>
                                <button type="button" class="color-swatch" data-color="#d16a8c" style="--swatch:#d16a8c"
                                    aria-label="玫紅"></button>
                                <button type="button" class="color-swatch" data-color="#7b60a8" style="--swatch:#7b60a8"
                                    aria-label="紫色"></button>
                                <button type="button" class="color-swatch" data-color="#3f8e8a" style="--swatch:#3f8e8a"
                                    aria-label="青綠"></button>
                                <button type="button" class="color-swatch" data-color="#f2c94c" style="--swatch:#f2c94c"
                                    aria-label="金黃"></button>
                            </div>
                        </div>
                        <div class="range-inline">
                            <input type="range" id="rngStickerBoxOpacity" min="0" max="100" step="1" value="20">
                            <span id="lblStickerBoxOpacity">20%</span>
                        </div>
                    </div>
                </div>

                <button id="btnAddTextSticker" class="full-btn">加入</button>
            </div>

            <!-- 6. 貼圖面板 -->
            <div id="tab-giphy" class="panel">
                <h4 class="sub-title">Giphy 貼圖</h4>

                <div class="form-group">
                    <label for="gifSearchInput">貼圖關鍵字</label>
                    <div class="gif-search-row">
                        <input id="gifSearchInput" type="text" class="full-width"
                            placeholder="例如：happy、love、hair、birthday" autocomplete="off">
                        <button id="btnGifSearch" type="button" class="sub-btn">搜尋</button>
                    </div>
                </div>

                <div class="gif-search-hint">輸入關鍵字後，點選下方貼圖即可加入上方編輯區。</div>
                <div id="gifSearchStatus" class="gif-search-status">尚未搜尋</div>
                <div id="gifResultGrid" class="gif-result-grid"></div>
            </div>

        </div>
    </div>

    <!-- Toast 通知元件 -->
    <div id="toast" class="toast">複製成功！現在可以去 IG 貼上了 🎉</div>

    <script src="app.js"></script>
</body>

</html>
